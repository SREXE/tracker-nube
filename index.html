<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker V1 (Nube)</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --header-bg: rgba(30, 30, 30, 0.9);
            --border-color: #444444;
            --text-color: #e0e0e0;
            --accent-color: #3b82f6;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --cell-size: 32px;
            --sidebar-width: 220px;
            --container-bg: rgba(20, 20, 22, 0.85);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            /* Configuración del fondo animado */
            background-image: url('image_d4b4a9.jpg');
            background-size: 115% 115%; /* Ligeramente más grande para que tenga margen al moverse */
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            animation: moverFondo 25s infinite alternate ease-in-out;
        }

        @keyframes moverFondo {
            0% { background-position: left top; }
            100% { background-position: right bottom; }
        }

        .main-wrapper { max-width: 100%; margin: 0 auto; }
        
        .container {
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .app-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; gap: 15px; }
        .app-title h1 { color: #ffffff; margin: 0; font-size: 28px; display: flex; align-items: center; gap: 10px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }

        .controls, .backup-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .date-selectors { display: flex; gap: 5px; }

        select.month-selector, input.year-selector {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-weight: bold;
            color: var(--accent-color);
            background-color: rgba(30, 30, 30, 0.9);
        }
        input.year-selector { width: 80px; text-align: center; }

        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }
        .btn-primary { background-color: var(--accent-color); } 
        .btn-success { background-color: var(--success-color); } 
        .btn-export { background-color: #555; } 
        .btn-backup { background-color: #ff9800; color: white; }

        .top-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; padding-bottom: 25px; border-bottom: 2px solid var(--border-color); }
        .dashboard-item { text-align: center; padding: 15px; background: rgba(40, 40, 40, 0.6); border-radius: 10px; border: 1px solid #555; backdrop-filter: blur(4px); }
        .dashboard-item span { display: block; font-size: 0.9em; color: #bbb; margin-bottom: 8px; font-weight: 600; }
        .dashboard-item strong { font-size: 1.8em; color: #ffffff; }
        .dashboard-item.highlight strong { color: var(--accent-color); } 
        .dashboard-item.streak strong { color: #ff6b6b; }

        .global-progress-container { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .global-progress-bar { height: 100%; background: linear-gradient(90deg, #1a73e8, #4285f4); width: 0%; transition: width 0.8s; }

        .spreadsheet-wrapper { overflow-x: auto; border-radius: 8px; background: transparent; }
        .spreadsheet { display: grid; border-top: 1px solid var(--border-color); border-left: 1px solid var(--border-color); width: max-content; }

        .cell { border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 13px; height: 36px; box-sizing: border-box; background: rgba(30, 30, 30, 0.8); color: var(--text-color); }
        .cell.habit-name, .cell.header.sticky-col, .cell.footer-title { position: sticky; left: 0; z-index: 10; background-color: #1e1e1e; border-right: 2px solid #555; }
        .cell.header { background-color: var(--header-bg); font-weight: bold; text-align: center; color: #fff; }
        .cell.habit-name { justify-content: space-between; padding: 0 10px; font-weight: bold; }

        /* Reglas !important para sobrescribir los estilos en línea que genera tu JS */
        div[style*="background-color: #f1f3f4;"] { background-color: rgba(60, 60, 60, 0.8) !important; }
        div[style*="background-color: #fafbfc;"] { background-color: rgba(45, 45, 45, 0.8) !important; }
        div[style*="background-color: #eef0f2;"] { background-color: rgba(50, 50, 50, 0.8) !important; }
        span[style*="color:black;"] { color: #ffffff !important; }
        div[style*="color:#666;"] { color: #bbbbbb !important; }

        .habit-info { display: flex; align-items: center; gap: 8px; }
        .habit-actions { display: flex; gap: 5px; opacity: 0; transition: opacity 0.2s; }
        .cell.habit-name:hover .habit-actions { opacity: 1; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 2px; filter: grayscale(0.5); transition: 0.2s; }
        .icon-btn:hover { filter: grayscale(0); transform: scale(1.2); }
        
        .cell.week-header { background-color: rgba(42, 52, 65, 0.9); border-right: 2px solid #4a6fa5; font-size: 11px; color: #ddd; }
        .col-end-week { border-right: 2px solid #4a6fa5 !important; }

        .checkbox-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .checkbox-wrapper input[type="checkbox"] { appearance: none; -webkit-appearance: none; position: relative; width: 20px; height: 20px; border: 2px solid #666; border-radius: 4px; cursor: pointer; background-color: rgba(20, 20, 20, 0.9); transition: all 0.2s; }
        .checkbox-wrapper input[type="checkbox"]:hover { border-color: var(--accent-color); transform: scale(1.1); }
        .checkbox-wrapper input[type="checkbox"]:checked { background-color: var(--habit-color, var(--accent-color)); border-color: var(--habit-color, var(--accent-color)); }
        .checkbox-wrapper input[type="checkbox"]:checked::after { content: '✓'; position: absolute; color: white; font-size: 14px; font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; }

        .analysis-bar-bg { width: 80%; height: 16px; background: #333; border-radius: 8px; overflow: hidden; }
        .analysis-bar-fill { height: 100%; background: var(--habit-color, var(--accent-color)); width: 0%; transition: width 0.6s; }
        
        .cell.footer-title { background: #1e1e1e; justify-content: flex-end; padding-right: 10px; }
        .cell.footer-data { background: rgba(40, 40, 40, 0.9); font-size: 12px; font-weight: 600; color: #eee; }

        .charts-wrapper { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 30px; }
        .chart-container { background: var(--container-bg); padding: 20px; border-radius: 12px; height: 350px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .chart-title { text-align: center; margin-top: 0; color: #eee; font-size: 16px; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; backdrop-filter: blur(3px); }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; transform: translateY(-20px); box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #444; }
        .modal-overlay.active .modal { transform: translateY(0); }
        
        .form-group { margin-bottom: 15px; } 
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #ddd; }
        .form-group input[type="text"] { width: 100%; padding: 10px; border: 1px solid #555; border-radius: 6px; background: #2a2a2a; color: #fff; box-sizing: border-box; }
        .form-group input[type="color"] { width: 100%; height: 40px; border: none; cursor: pointer; background: #2a2a2a; border-radius: 6px; }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        
        @media (max-width: 992px) { .charts-wrapper { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .app-header { flex-direction: column; align-items: flex-start; } .habit-actions { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-wrapper" id="pdf-content">
    <div class="app-header">
        <div class="app-title"><h1>🧠 Tracker Ultra Pro V3</h1></div>
        
        <div class="backup-controls" data-html2canvas-ignore>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBackup(event)">
            <button class="btn btn-backup" onclick="downloadBackup()">💾 Guardar Backup</button>
            <button class="btn btn-backup" onclick="triggerImport()" style="background-color: #009688;">📂 Cargar Backup</button>
        </div>

        <div class="controls" data-html2canvas-ignore>
            <div class="date-selectors">
                <select class="month-selector" id="monthSelect" onchange="changeDate()">
                    <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
                    <option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option>
                    <option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option>
                    <option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
                </select>
                <input type="number" class="year-selector" id="yearSelect" value="2026" min="2020" max="2100" onchange="validateAndChangeDate()">
            </div>
            
            <button class="btn btn-primary" onclick="openModal()">+ Nuevo Hábito</button>
            <button class="btn btn-success" onclick="exportExcel()">📊 Exportar Excel</button>
            <button class="btn btn-export" onclick="exportPDF()">📄 Exportar PDF</button>
        </div>
    </div>

    <div class="container">
        <div class="top-dashboard">
            <div class="dashboard-item"><span>Hábitos Activos</span><strong id="total-habits-lbl">0</strong></div>
            <div class="dashboard-item"><span>Días Cumplidos</span><strong id="total-days-lbl">0</strong></div>
            <div class="dashboard-item highlight"><span>Progreso del Mes</span><strong id="global-progress-txt">0.00%</strong>
                <div class="global-progress-container"><div class="global-progress-bar" id="global-progress-bar"></div></div>
            </div>
            <div class="dashboard-item streak"><span>🔥 Racha Actual</span><strong><span id="current-streak-lbl">0</span> Días</strong></div>
            <div class="dashboard-item"><span>🏆 Mejor Racha</span><strong><span id="best-streak-lbl">0</span> Días</strong></div>
        </div>
        <div class="spreadsheet-wrapper"><div class="spreadsheet" id="spreadsheet"></div></div>
    </div>

    <div class="charts-wrapper">
        <div class="chart-container"><h3 class="chart-title" id="chart-title-month">Progreso Diario</h3><canvas id="progressChart"></canvas></div>
        <div class="chart-container"><h3 class="chart-title" id="chart-title-annual">Historial Anual (%)</h3><canvas id="annualChart"></canvas></div>
    </div>
</div>

<div class="modal-overlay" id="habitModal">
    <div class="modal">
        <h2 id="modalTitle" style="margin-top:0;">Crear Hábito</h2>
        <input type="hidden" id="habitId">
        <div class="form-group"><label>Nombre del Hábito:</label><input type="text" id="habitName" placeholder="Ej: Correr 5km"></div>
        <div class="form-group"><label>Icono (Emoji):</label><input type="text" id="habitIcon" placeholder="Ej: 🏃‍♂️" maxlength="4"></div>
        <div class="form-group"><label>Color (Opcional):</label><input type="color" id="habitColor" value="#1a73e8"></div>
        <div class="modal-actions"><button class="btn btn-export" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveHabitForm()">Guardar</button></div>
    </div>
</div>

<script>
    /* ==========================================
       🔥 CONFIGURACIÓN DE FIREBASE (AQUÍ PEGARÁS TUS DATOS)
       ========================================== */
    const firebaseConfig = {
      apiKey: "AIzaSyDnmN-5nZdDthtsVNIFufaW0qYKvBub4qw",
      authDomain: "trackerultrapro.firebaseapp.com",
      projectId: "trackerultrapro",
      databaseURL: "https://trackerultrapro-default-rtdb.firebaseio.com/",
      storageBucket: "trackerultrapro.firebasestorage.app",
      messagingSenderId: "297732602613",
      appId: "1:297732602613:web:6fd9b33a0ed3a6e309a3bc"
    };

    let db;
    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    } catch (error) {
        console.error("Firebase no está configurado todavía.");
    }

    /* ==========================================
       ESTADO DE LA APLICACIÓN
       ========================================== */
    let currentYear = new Date().getFullYear();
    let currentMonthIndex = new Date().getMonth();
    
    const defaultHabits = [
        { id: 'h1', name: "Levantarse 7:00", icon: "⏰", color: "#fbbc04" },
        { id: 'h2', name: "Gym", icon: "💪", color: "#ea4335" },
        { id: 'h3', name: "Leer", icon: "📚", color: "#4285f4" },
        { id: 'h4', name: "Programar", icon: "💻", color: "#34a853" },
        { id: 'h5', name: "Meditar", icon: "🧘‍♂️", color: "#9c27b0" },
        { id: 'h6', name: "No alcohol", icon: "🍾", color: "#e91e63" },
        { id: 'h7', name: "Ducha fría", icon: "🚿", color: "#00bcd4" },
        { id: 'h8', name: "Detox redes", icon: "🌿", color: "#8bc34a" },
        { id: 'h9', name: "Estudiar", icon: "📝", color: "#ff9800" },
        { id: 'h10', name: "Proyectos", icon: "🎯", color: "#673ab7" },
        { id: 'h11', name: "Planificar día", icon: "📅", color: "#3f51b5" },
        { id: 'h12', name: "Dormir temprano", icon: "🌙", color: "#607d8b" },
        { id: 'h13', name: "Organizar finanzas", icon: "💰", color: "#ffc107" },
        { id: 'h14', name: "Seguir metas", icon: "📒", color: "#795548" },
        { id: 'h15', name: "Comer saludable", icon: "🥗", color: "#4caf50" }
    ];

    let appData = { habits: [], checks: {}, bestStreakGlobal: 0 };
    let chartMonthInstance = null; let chartAnnualInstance = null;

    /* ==========================================
       INICIALIZACIÓN Y SINCRONIZACIÓN (NUBE)
       ========================================== */
    function initApp() {
        document.getElementById('monthSelect').value = currentMonthIndex;
        document.getElementById('yearSelect').value = currentYear;

        if (db) {
            db.ref('mi_tracker_datos').on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (data && data.habits) {
                    appData.habits = data.habits;
                    appData.checks = data.checks || {};
                    appData.bestStreakGlobal = data.bestStreakGlobal || 0;
                    renderAll(); 
                } else {
                    appData.habits = [...defaultHabits];
                    appData.checks = {};
                    appData.bestStreakGlobal = 0;
                    saveState(); 
                    renderAll();
                }
            }, (error) => {
                console.error("Firebase bloqueado:", error);
                appData.habits = [...defaultHabits];
                renderAll();
            });
        } else {
            console.log("Trabajando en modo local.");
            appData.habits = [...defaultHabits];
            renderAll();
        }
    }

    function saveState() {
        if (db) {
            db.ref('mi_tracker_datos').set(appData);
        }
    }

    function downloadBackup() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
        const a = document.createElement('a'); a.href = dataStr; a.download = `Backup_${currentYear}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
    
    function triggerImport() { document.getElementById('importFile').click(); }
    
    function importBackup(event) {
        const file = event.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if(data && data.habits) { appData = data; saveState(); alert("¡Backup restaurado en la nube!"); }
            } catch(err) { alert("Error al leer el archivo."); }
        };
        reader.readAsText(file);
    }

    /* ==========================================
       LÓGICA DE TIEMPO Y UI
       ========================================== */
    function validateAndChangeDate() {
        const input = document.getElementById('yearSelect');
        let val = parseInt(input.value);
        if (isNaN(val) || val < 2020) { val = 2020; input.value = 2020; }
        if (val > 2100) { val = 2100; input.value = 2100; }
        changeDate();
    }

    function changeDate() {
        currentMonthIndex = parseInt(document.getElementById('monthSelect').value);
        currentYear = parseInt(document.getElementById('yearSelect').value);
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        document.getElementById('chart-title-month').innerText = `Progreso Diario (${meses[currentMonthIndex]} ${currentYear})`;
        document.getElementById('chart-title-annual').innerText = `Historial Anual ${currentYear} (%)`;
        renderAll();
    }

    function getDaysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }
    function getFirstDayOffset(year, month) { let day = new Date(year, month, 1).getDay(); return day === 0 ? 6 : day - 1; }

    function renderAll() {
        renderGrid();
        updateStatsAndCharts();
    }

    function renderGrid() {
        const grid = document.getElementById('spreadsheet');
        const diasMes = getDaysInMonth(currentYear, currentMonthIndex);
        const offsetDia = getFirstDayOffset(currentYear, currentMonthIndex);
        const diasSemana = ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sá', 'Do'];
        const monthKey = `${currentYear}-${currentMonthIndex}`;
        
        if (!appData.checks[monthKey]) appData.checks[monthKey] = {};
        grid.style.gridTemplateColumns = `var(--sidebar-width) repeat(${diasMes}, var(--cell-size)) 60px 60px 150px`;

        let html = `<div class="cell header sticky-col" style="border-top-left-radius: 8px;">Semanas</div>`;
        for (let d = 1; d <= diasMes; d++) {
            let diaIndex = (d - 1 + offsetDia) % 7;
            let classExtra = (diaIndex === 6) ? 'col-end-week' : '';
            let text = (diaIndex === 3) ? `Semana ${Math.ceil((d + offsetDia) / 7)}` : '';
            html += `<div class="cell header week-header ${classExtra}">${text}</div>`;
        }
        html += `<div class="cell header" style="grid-column: span 3;">Análisis</div>`;

        html += `<div class="cell header sticky-col" style="color: var(--accent-color);">📋 Mis Hábitos</div>`;
        for (let d = 1; d <= diasMes; d++) {
            let diaTexto = diasSemana[(d - 1 + offsetDia) % 7];
            let classExtra = ((d - 1 + offsetDia) % 7 === 6) ? 'col-end-week' : '';
            let bgStyle = (diaTexto === 'Sá' || diaTexto === 'Do') ? 'background-color: #f1f3f4;' : '';
            html += `<div class="cell header ${classExtra}" style="flex-direction:column; line-height:1.2; font-size: 11px; ${bgStyle}">
                        <span>${diaTexto}</span><span style="font-size:13px; color:black;">${d}</span>
                     </div>`;
        }
        html += `<div class="cell header" style="font-size:11px;">Meta</div><div class="cell header" style="font-size:11px;">Actual</div><div class="cell header" style="font-size:11px;">Progreso %</div>`;

        appData.habits.forEach(habit => {
            if (!appData.checks[monthKey][habit.id]) appData.checks[monthKey][habit.id] = {};
            const checks = appData.checks[monthKey][habit.id];

            html += `<div class="cell habit-name sticky-col">
                        <div class="habit-info"><span>${habit.icon}</span><span>${habit.name}</span></div>
                        <div class="habit-actions" data-html2canvas-ignore>
                            <button class="icon-btn edit" onclick="openModal('${habit.id}')">✏️</button>
                            <button class="icon-btn delete" onclick="deleteHabit('${habit.id}')">❌</button>
                        </div>
                    </div>`;
            
            for (let d = 1; d <= diasMes; d++) {
                let classExtra = ((d - 1 + offsetDia) % 7 === 6) ? 'col-end-week' : '';
                let isChecked = checks[d-1] ? 'checked' : '';
                let bgStyle = ((d - 1 + offsetDia) % 7 >= 5) ? 'background-color: #fafbfc;' : '';
                
                html += `<div class="cell ${classExtra}" style="${bgStyle}">
                            <div class="checkbox-wrapper" style="--habit-color: ${habit.color}">
                                <input type="checkbox" aria-label="Marcar ${habit.name} día ${d}" onchange="toggleCheck('${habit.id}', ${d-1}, this.checked)" ${isChecked}>
                            </div>
                        </div>`;
            }
            html += `<div class="cell" style="font-weight:bold; color:#666;">${diasMes}</div><div class="cell" id="actual-${habit.id}" style="font-weight:bold;">0</div>
                     <div class="cell" style="padding: 0 10px; width:100%;"><div class="analysis-bar-bg"><div class="analysis-bar-fill" id="bar-${habit.id}" style="--habit-color: ${habit.color}"></div></div></div>`;
        });

        const footers = [{ id: 'prog', title: '📈 Progreso', format: '%' }, { id: 'hecho', title: '✅ Hechos', format: '' }];
        footers.forEach((f, idx) => {
            html += `<div class="cell footer-title sticky-col">${f.title}</div>`;
            for (let d = 1; d <= diasMes; d++) {
                let classExtra = ((d - 1 + offsetDia) % 7 === 6) ? 'col-end-week' : '';
                let bgStyle = ((d - 1 + offsetDia) % 7 >= 5) ? 'background-color: #eef0f2;' : '';
                html += `<div class="cell footer-data ${classExtra}" id="footer-${f.id}-${d-1}" style="${bgStyle}">0${f.format}</div>`;
            }
            html += `<div class="cell footer-data" style="grid-column: span 3;"></div>`;
        });

        grid.innerHTML = html;
    }

    /* ==========================================
       DATOS, RACHAS Y GRÁFICAS
       ========================================== */
    function toggleCheck(habitId, dayIndex, isChecked) {
        const monthKey = `${currentYear}-${currentMonthIndex}`;
        appData.checks[monthKey][habitId][dayIndex] = isChecked;
        saveState(); 
    }

    function getCompletedForDay(mKey, dayIndex) {
        let count = 0;
        appData.habits.forEach(h => { if (appData.checks[mKey] && appData.checks[mKey][h.id] && appData.checks[mKey][h.id][dayIndex]) count++; });
        return count;
    }

    function calculateGlobalStreak() {
        if (appData.habits.length === 0) return 0;
        let streak = 0; let d = new Date();
        let y = d.getFullYear(); let m = d.getMonth(); let day = d.getDate() - 1;
        let mKey = `${y}-${m}`;
        
        if (getCompletedForDay(mKey, day) === appData.habits.length) streak++;

        d.setDate(d.getDate() - 1); 
        while(true) {
            y = d.getFullYear(); m = d.getMonth(); day = d.getDate() - 1;
            mKey = `${y}-${m}`;
            if (!appData.checks[mKey]) break; 
            if (getCompletedForDay(mKey, day) === appData.habits.length) { streak++; d.setDate(d.getDate() - 1); } else break;
        }
        return streak;
    }

    function updateStatsAndCharts() {
        const diasMes = getDaysInMonth(currentYear, currentMonthIndex);
        const monthKey = `${currentYear}-${currentMonthIndex}`;
        const totalHabitsCount = appData.habits.length;
        if(totalHabitsCount === 0) return;

        let monthTotalCompleted = 0; let dailyProgressData = []; let allDaysOverallCompleted = 0;

        for (const mk in appData.checks) {
            for (const hId in appData.checks[mk]) {
                for (const d in appData.checks[mk][hId]) { if (appData.checks[mk][hId][d]) allDaysOverallCompleted++; }
            }
        }

        appData.habits.forEach(habit => {
            let habitCompleted = 0; const checks = appData.checks[monthKey][habit.id] || {};
            for (let d = 0; d < diasMes; d++) { if (checks[d]) habitCompleted++; }
            monthTotalCompleted += habitCompleted;
            
            const actualEl = document.getElementById(`actual-${habit.id}`); const barEl = document.getElementById(`bar-${habit.id}`);
            if (actualEl) actualEl.innerText = habitCompleted;
            if (barEl) barEl.style.width = `${(habitCompleted / diasMes) * 100}%`;
        });

        for (let d = 0; d < diasMes; d++) {
            let dayCompleted = getCompletedForDay(monthKey, d);
            let dayPercent = (dayCompleted / totalHabitsCount) * 100;
            dailyProgressData.push(dayPercent);
            const footerHecho = document.getElementById(`footer-hecho-${d}`); const footerProg = document.getElementById(`footer-prog-${d}`);
            if(footerHecho) footerHecho.innerText = dayCompleted; if(footerProg) footerProg.innerText = `${Math.round(dayPercent)}%`;
        }

        let currentGlobalStreak = calculateGlobalStreak();
        if (currentGlobalStreak > appData.bestStreakGlobal) { appData.bestStreakGlobal = currentGlobalStreak; saveState(); }

        document.getElementById('total-habits-lbl').innerText = totalHabitsCount;
        document.getElementById('total-days-lbl').innerText = allDaysOverallCompleted;
        document.getElementById('global-progress-txt').innerText = `${((monthTotalCompleted / (totalHabitsCount * diasMes)) * 100).toFixed(1)}%`;
        document.getElementById('global-progress-bar').style.width = `${(monthTotalCompleted / (totalHabitsCount * diasMes)) * 100}%`;
        document.getElementById('current-streak-lbl').innerText = currentGlobalStreak;
        document.getElementById('best-streak-lbl').innerText = appData.bestStreakGlobal;

        updateMonthlyChart(dailyProgressData, diasMes); updateAnnualChart();
    }

    function updateMonthlyChart(dataPoints, diasMes) {
        const ctx = document.getElementById('progressChart').getContext('2d'); const labels = Array.from({length: diasMes}, (_, i) => `${i + 1}`);
        if (chartMonthInstance) { chartMonthInstance.data.labels = labels; chartMonthInstance.data.datasets[0].data = dataPoints; chartMonthInstance.update(); } 
        else {
            chartMonthInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'Progreso (%)', data: dataPoints, borderColor: '#1a73e8', backgroundColor: 'rgba(26, 115, 232, 0.2)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
            });
        }
    }

    function updateAnnualChart() {
        const ctx = document.getElementById('annualChart').getContext('2d'); const meses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"]; let data = [];
        for (let m = 0; m < 12; m++) {
            const mKey = `${currentYear}-${m}`; let total = 0; let possible = appData.habits.length * getDaysInMonth(currentYear, m);
            if (appData.checks[mKey] && possible > 0) {
                for (const hId in appData.checks[mKey]) { for (const d in appData.checks[mKey][hId]) { if (appData.checks[mKey][hId][d]) total++; } }
            }
            data.push(possible === 0 ? 0 : (total / possible) * 100);
        }
        if (chartAnnualInstance) { chartAnnualInstance.data.datasets[0].data = data; chartAnnualInstance.update(); } 
        else {
            chartAnnualInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: meses, datasets: [{ label: 'Progreso (%)', data: data, backgroundColor: '#34a853', borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
            });
        }
    }

    /* ==========================================
       CRUD HÁBITOS Y EXPORTACIONES
       ========================================== */
    function openModal(habitId = null) {
        document.getElementById('habitModal').classList.add('active');
        if (habitId) {
            const habit = appData.habits.find(h => h.id === habitId);
            document.getElementById('modalTitle').innerText = "Editar Hábito";
            document.getElementById('habitId').value = habit.id; document.getElementById('habitName').value = habit.name;
            document.getElementById('habitIcon').value = habit.icon; document.getElementById('habitColor').value = habit.color;
        } else {
            document.getElementById('modalTitle').innerText = "Crear Nuevo Hábito";
            document.getElementById('habitId').value = ""; document.getElementById('habitName').value = "";
            document.getElementById('habitIcon').value = "✨"; document.getElementById('habitColor').value = "#1a73e8";
        }
    }
    
    function closeModal() { document.getElementById('habitModal').classList.remove('active'); }
    
    function saveHabitForm() {
        const id = document.getElementById('habitId').value; const name = document.getElementById('habitName').value.trim();
        const icon = document.getElementById('habitIcon').value.trim(); const color = document.getElementById('habitColor').value;
        if (!name) { alert("Ingresa un nombre"); return; }
        
        const isDuplicate = appData.habits.some(h => h.name.toLowerCase() === name.toLowerCase() && h.id !== id);
        if (isDuplicate) { alert("¡Ya tienes un hábito con este nombre!"); return; }

        if (id) { const i = appData.habits.findIndex(h => h.id === id); if(i > -1) appData.habits[i] = { id, name, icon, color }; } 
        else { appData.habits.push({ id: 'h' + Date.now(), name, icon, color }); }
        saveState(); closeModal();
    }
    
    function deleteHabit(habitId) {
        if (confirm("¿Eliminar este hábito? Se perderá su historial.")) {
            appData.habits = appData.habits.filter(h => h.id !== habitId);
            for(let m in appData.checks) { if(appData.checks[m][habitId]) delete appData.checks[m][habitId]; }
            saveState();
        }
    }

    function exportExcel() {
        let csvContent = "data:text/csv;charset=utf-8,";
        const diasMes = getDaysInMonth(currentYear, currentMonthIndex);
        const monthKey = `${currentYear}-${currentMonthIndex}`;
        let row = ["Habito", ...Array.from({length: diasMes}, (_, i) => i + 1), "Meta", "Actual"];
        csvContent += row.join(",") + "\r\n";

        appData.habits.forEach(habit => {
            let rowData = [habit.name];
            let actual = 0;
            const checks = appData.checks[monthKey][habit.id] || {};
            for (let d = 0; d < diasMes; d++) {
                let isChecked = checks[d] ? "1" : "0";
                if(isChecked === "1") actual++;
                rowData.push(isChecked);
            }
            rowData.push(diasMes); rowData.push(actual);
            csvContent += rowData.join(",") + "\r\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Tracker_${currentMonthIndex+1}_${currentYear}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function exportPDF() {
        const wrapper = document.querySelector('.spreadsheet-wrapper');
        const stickies = document.querySelectorAll('.sticky-col');
        
        wrapper.style.overflow = 'visible';
        stickies.forEach(el => el.style.position = 'static');
        
        const element = document.getElementById('pdf-content');
        const opt = {
            margin:       10,
            filename:     `HabitTracker_${currentMonthIndex+1}_${currentYear}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a3', orientation: 'landscape' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            wrapper.style.overflow = 'auto';
            stickies.forEach(el => el.style.position = 'sticky');
        });
    }

    window.onload = initApp;
</script>
